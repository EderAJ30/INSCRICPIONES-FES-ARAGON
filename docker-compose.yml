services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inscripcionesico_app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: inscripcionesico_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.4
    container_name: inscripcionesico_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-inscripcionesico}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-1234}
      MYSQL_PASSWORD: ${DB_PASSWORD:-1234}
      MYSQL_USER: ${DB_USERNAME:-eder}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  db_data:
